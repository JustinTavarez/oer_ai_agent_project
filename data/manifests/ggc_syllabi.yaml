# GGC Simple Syllabus manifest.
#
# Source: ggc.simplesyllabus.com is a JavaScript-rendered Angular SPA. The
# public HTML at /doc/<id>/<tail>?mode=view returns ~18KB of skeleton with
# no embedded data, no <title> beyond "Simple Syllabus", and no SEO content.
# The derived /api2/doc-pdf/<id>/<tail>.pdf endpoint returns HTTP 500 (i.e.
# there is no public PDF download path).
#
# Consequence: the ingestion pipeline records GGC entries as
# `content_kind: metadata_reference` rows. The synthesized body text contains
# the manifest fields (course_code, title, term, section/CRN, URL) and an
# explicit disclaimer that the syllabus body is JS-rendered and visitable
# via the URL. This satisfies the requirement to keep both required sources
# (GGC Simple Syllabus + Open ALG) in the real-data collection without
# pretending GGC entries contain extracted body text.
#
# Discovery scope:
#   For each (course, term) we ran multiple Google `site:ggc.simplesyllabus.com`
#   searches (with and without quotes, with the `2025-Fall-` / `2026-Spring-`
#   slug prefix). 4 of 16 (course, term) combos surfaced indexed pages.
#   Per GGC's published policy
#     www.ggc.edu/faculty-and-staff/inside-ggc/publicly-available-course-syllabuses
#   only Core IMPACTS courses were required to be public for Spring 2026,
#   and only Core IMPACTS + School-of-Education for Fall 2025; ITEC 1001 is
#   not Core IMPACTS and is not required to be public until Fall 2026.
#   Many sections that exist publicly are also simply not yet indexed by
#   Google because the site is a JS SPA.
#
# Required fields: course_code, source, url, resource_type
# Optional fields: title, term, notes, mapping_rationale, subject_area
#
# When url == TODO the fetcher skips the row and the verifier lists it as
# a gap.

